name: Chromatic

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

env:
  NODE_VERSION: '22'

jobs:
  chromatic:
    name: Publish Storybook to Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish to Chromatic
        # v11 embarcava Chromatic CLI 11.29.0 (significantly outdated per
        # alerta do build); v17 traz Chromatic CLI v17.0.0.
        uses: chromaui/action@v17
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          # PR do unico maintainer (fernandoseguim) auto-aceita diffs em
          # qualquer branch — voce controla 100% do que entra; PR de
          # qualquer outro autor (contribuidor externo, bot nao listado)
          # cai no comportamento conservador (so auto-aceita em master).
          autoAcceptChanges: ${{ github.actor == 'fernandoseguim' && '*' || 'master' }}
          onlyChanged: true
