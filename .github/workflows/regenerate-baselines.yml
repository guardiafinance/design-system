name: Regenerate Visual Baselines

# Cross-platform baseline drift: font rendering / antialiasing differem
# entre macOS (dev local) e Ubuntu (CI). Baselines geradas em ambiente
# distinto do CI provocam diff sistematico em todas as stories. Padrao
# adotado: o CI Ubuntu e a source of truth para os PNGs em
# __image_snapshots__/.
#
# Quando rodar:
# 1. Setup inicial deste gate (ja feito no PR #129)
# 2. Apos qualquer mudanca em design tokens, fonts globais ou Storybook
#    preview que afete render em escala
# 3. Quando contribuidor reportar diff visual que reproduz no CI mas nao
#    local — provavel mismatch macOS x Ubuntu
#
# Pode ser triggado pelo dropdown "Run workflow" na aba Actions.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch para regenerar (default = branch atual)
        required: false
        default: ''

env:
  NODE_VERSION: '22'

jobs:
  regenerate:
    name: Regenerate baselines on Ubuntu
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve target branch
        id: branch
        run: |
          BRANCH="${{ inputs.branch }}"
          if [ -z "$BRANCH" ]; then BRANCH="${{ github.ref_name }}"; fi
          echo "Target branch: $BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build Storybook static
        run: npm run build-storybook

      # Roda test-storybook com -u contra o Storybook static. Sem --ci,
      # o jest-image-snapshot cria/atualiza baselines automaticamente.
      - name: Generate baselines
        run: |
          npx concurrently -k -s first -n SB,TEST -c magenta,blue \
            "npx http-server storybook-static -p 6006 -s" \
            "npx wait-on tcp:6006 && npx test-storybook --url http://localhost:6006 -u"

      # Commit assinado pelo GitHub via Git Database API (cumpre
      # lex-signed-commits — direct git push do runner usando GITHUB_TOKEN
      # nao seria verificado).
      - name: Push baselines as signed commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: node scripts/push-baselines.mjs

      - name: Hint to re-run CI
        run: |
          echo "::notice::Baselines regenerated and pushed. GitHub Actions does not auto-trigger pull_request from GITHUB_TOKEN pushes — open the failed PR run and click 'Re-run failed jobs' to validate against the new baselines."
