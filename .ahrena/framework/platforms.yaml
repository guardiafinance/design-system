# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Ahrena: Platform-specific artifact application
#
# Defines per platform:
#   1. Transposition: Ahrena pilar -> platform resource (lex/codex -> rules, etc.)
#   2. Application config: how each artifact is applied (alwaysApply, globs, description)
#
# Per lex-platforms-rules: every Lexis and Codex MUST have an entry under cursor.rules
# with at least description. Default (framework) can be overridden by .ahrena/platforms.yaml.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

cursor:
  transposition:
    lex: rules
    codex: rules
    kata: skills
    warrior: agents
    cry: commands

  rules:
    _foundation/process/lexis/lex-agent-planning:
      alwaysApply: true
      description: "Before any multi-step task, create a Plan sub-issue on GitHub linked to its parent Issue and materialize the provider cache at ./{agent}/plans/plan-{M}-{slug}.md (where {M} is the sub-issue number and {slug} matches the branch). Present to the user and wait for confirmation before executing."
    _foundation/process/codex/codex-agent-planning:
      alwaysApply: false
      description: "When creating or maintaining agent task plans, consult this codex for canonical path resolution, naming convention, full template, and lifecycle states."
    _foundation/process/lexis/lex-directives:
      alwaysApply: true
      description: "Read .ahrena/.directives before producing any artifact. Apply at session start."
    _foundation/process/lexis/lex-checkpoint:
      alwaysApply: true
      description: "Read .checkpoint at session start; save it on demand or at end of session when context changed. Schema is canonical (Session focus, Active plans, Open threads, Notes); must not duplicate plan content."
    _foundation/process/codex/codex-checkpoint:
      alwaysApply: false
      description: "When operating .checkpoint (read, save, troubleshoot), consult this codex for typical usage, schema details, and delineation against lex-agent-planning."
    _foundation/process/lexis/lex-platforms-rules:
      alwaysApply: false
      description: "When creating or publishing a Lexis or Codex, add its rule key to cursor.rules in platforms.yaml with at least description."
    _foundation/process/lexis/lex-naming:
      alwaysApply: false
      description: "When naming files/dirs or placing artifacts, follow naming.prefixes, naming.casing, naming.addressing from .directives."
    _foundation/process/lexis/lex-no-plans-under-docs:
      alwaysApply: false
      description: "When materializing plan files (plan-*.md), only use .claude/plans/, .cursor/plans/ (provider caches, gitignored) or the GitHub Plan sub-issue body. Never under docs/ or any path combining docs/ and plans/."
    _foundation/process/lexis/lex-agent-focus-on-active-plan:
      alwaysApply: false
      description: "When a Plan sub-issue is in status: development with the current session as owner, decline unrelated requests until the Plan reaches status: to review. Three declared exceptions only: critical blocker, question about the Plan, scope adjustment of the Plan."
    _foundation/process/codex/codex-directives:
      alwaysApply: false
      description: "When interpreting paths, language, or naming, use this reference for .directives structure and keys."
    _foundation/process/codex/codex-paths:
      alwaysApply: false
      description: "When referencing or creating framework artifacts, use canonical paths from this codex."
    _foundation/process/codex/codex-naming:
      alwaysApply: false
      description: "When naming files or directories, apply conventions from .directives naming section (prefixes, extensions, casing)."
    _foundation/process/codex/codex-platforms:
      alwaysApply: false
      description: "When configuring platforms or cursor.rules/transposition, use platforms.yaml and this codex."
    _foundation/authoring/lexis/lex-pilars:
      alwaysApply: false
      description: "When choosing artifact type (Lexis, Codex, Kata, Warrior, Cry), apply Pilar rules from this lex."
    _foundation/authoring/codex/codex-pilars:
      alwaysApply: false
      description: "When creating or validating framework artifacts, follow Pilar system and creation flow from this codex."
    _foundation/authoring/codex/codex-lexis:
      alwaysApply: false
      description: "When writing or reviewing a Lexis, follow structure and Law format from this codex."
    _foundation/authoring/codex/codex-codex:
      alwaysApply: false
      description: "When writing or reviewing a Codex, follow structure and reference-manual format from this codex."
    _foundation/authoring/codex/codex-katas:
      alwaysApply: false
      description: "When writing or reviewing a Kata, follow procedure and SKILL format from this codex."
    _foundation/authoring/codex/codex-warriors:
      alwaysApply: false
      description: "When writing or reviewing a Warrior, follow agent definition and scope from this codex."
    _foundation/authoring/codex/codex-cries:
      alwaysApply: false
      description: "When writing or reviewing a Cry, follow command format and invocation from this codex."
    _foundation/contributing/lexis/lex-small-commits:
      alwaysApply: false
      description: "When committing, ensure one logical change per commit; split if multiple purposes."
    _foundation/contributing/lexis/lex-conventional-commits:
      alwaysApply: false
      description: "When writing a commit message, use format type(scope): description (feat, fix, docs, etc.)."
    _foundation/contributing/lexis/lex-commit-language:
      alwaysApply: false
      description: "When writing commit message: subject in English; use [lang] tag in body for local language."
    _foundation/contributing/lexis/lex-signed-commits:
      alwaysApply: false
      description: "When pushing commits or configuring Git, ensure commits are GPG-signed and show Verified."
    _foundation/contributing/lexis/lex-semantic-version:
      alwaysApply: false
      description: "When creating a release or tag, use MAJOR.MINOR.PATCH (SemVer); no other format allowed."
    _foundation/contributing/lexis/lex-annotated-tags:
      alwaysApply: false
      description: "When pushing a tag to a Guardia remote, ensure it is annotated (git tag -a) and GPG-signed (git tag -s); lightweight tags are forbidden."
    _foundation/contributing/codex/codex-commit-standards:
      alwaysApply: false
      description: "When writing or reviewing commit messages, apply footer and body standards from this codex."
    _foundation/contributing/codex/codex-contributing:
      alwaysApply: false
      description: "When opening a PR, reviewing, or merging, follow contribution flow and branch rules from this codex."
    _foundation/contributing/codex/codex-semantic-version:
      alwaysApply: false
      description: "When versioning or defining pre-release/build metadata, use SemVer 2.0 rules from this codex."
    _foundation/contributing/codex/codex-annotated-tags:
      alwaysApply: false
      description: "When creating, signing, or verifying Git tags, follow the operational commands and GPG configuration in this codex (companion to lex-annotated-tags)."
    _foundation/contributing/lexis/lex-git-branches:
      alwaysApply: false
      description: "When creating a branch, use format {type}/{issue-number}-{kebab-slug}; type must be a Conventional Commits type; issue number is mandatory."
    _foundation/contributing/lexis/lex-issue-first:
      alwaysApply: false
      description: "When starting any code change, ensure a GitHub Issue exists first; PR body must include Closes #N or Refs #N."
    _foundation/contributing/lexis/lex-protected-trunk:
      alwaysApply: false
      description: "Trunk branches (main, master, release/*) MUST be protected against direct writes; code reaches trunk only through merged PRs from feature branches."
    _foundation/contributing/codex/codex-git-workflow:
      alwaysApply: false
      description: "When contributing, follow the complete Issue → Branch → Commits → PR → Review → Merge workflow from this codex."
    _foundation/contributing/lexis/lex-issue-quality:
      alwaysApply: false
      description: "When creating or reviewing an issue, ensure it uses an approved template (feature-request, epic, user-story-for-api/frontend, bug, tech-task, plan), has required labels, has a defined Issue Type, answers Why/What/How, and (for non-Epic) carries status: todo at creation. Assignee is NOT a creation requirement — it is captured at todo → development by warrior-athena (second HARD-GATE in this Lex)."
    _foundation/contributing/lexis/lex-issue-status:
      alwaysApply: false
      description: "When applying or transitioning a status:* label, choose the axis based on artifact type: Axis A (dev cycle: todo→development→to review→review→done) for feature/fix Issues/PRs; Axis B (release cycle: to release→release→done) exclusively for the release Issue. Mutex is intra-artifact; cross-axis labeling is a HARD-GATE violation."
    _foundation/contributing/lexis/lex-issue-type-verified:
      alwaysApply: false
      description: "When creating an Issue via CLI/MCP (not via UI template), verify the native type field is populated post-creation and apply manually via gh api -X PATCH when empty. status: todo cannot be applied to a typeless Issue."
    _foundation/contributing/lexis/lex-pr-quality:
      alwaysApply: false
      description: "When creating a PR, mirror issue labels, apply size label, set assignee to author, and request reviewers per CODEOWNERS."
    _foundation/contributing/lexis/lex-git-worktrees:
      alwaysApply: false
      description: "When starting any branch-based task, work inside a dedicated git worktree per .worktrees/{N}-{slug}/ — except for stacked PRs which use a single shared worktree (Rule 5)."
    _foundation/contributing/codex/codex-labels:
      alwaysApply: false
      description: "When creating issues or PRs, consult this codex for the full label taxonomy, GitHub Issue Types, size thresholds, and mirroring rules."
    _foundation/contributing/codex/codex-git-worktrees:
      alwaysApply: false
      description: "When creating a worktree to isolate a branch task, consult this codex for naming conventions, lifecycle, commands, and the shared-worktree exception for stacked PRs."
    _foundation/contributing/codex/codex-stacked-prs:
      alwaysApply: false
      description: "When deciding whether to split a feature into stacked PRs and how to operate the chain, consult this codex for the canonical Decision Checklist and the vanilla git+gh flow."
    _foundation/i18n/lexis/lex-framework-language:
      alwaysApply: false
      description: "When creating or placing i18n artifacts, use language as first path segment (e.g. pt-BR/, en/)."
    _foundation/i18n/codex/codex-framework-language:
      alwaysApply: false
      description: "When organizing artifacts by language, follow framework language structure from this codex."
    _foundation/quality/lexis/lex-hard-gate-pattern:
      alwaysApply: false
      description: "When a Lexis requires flow blocking (forbidden action with non-negotiable preconditions), apply the literal <HARD-GATE> block with subject, action, preconditions, scope, counter-pretexts, and declared exceptions."
    _foundation/quality/lexis/lex-template-usage:
      alwaysApply: false
      description: "When creating a Lexis, Codex, Kata, Warrior, or Cry, start from the official template in .directives paths.samples."
    _foundation/quality/lexis/lex-tone:
      alwaysApply: false
      description: "When drafting framework artifacts or agent communication, apply tone and style from this lex."
    _foundation/quality/codex/codex-tone:
      alwaysApply: false
      description: "When editing documentation or rules, ensure tone consistency using this codex."
    _foundation/tooling/lexis/lex-terminal-type:
      alwaysApply: false
      description: "When running or suggesting shell commands, use terminal type from .ahrena/.directives (bash or PowerShell)."
    _foundation/tooling/codex/codex-terminal-type:
      alwaysApply: false
      description: "When generating command examples in docs, use bash or PowerShell per .directives; see this codex for usage."
    _foundation/tooling/codex/codex-make:
      alwaysApply: false
      description: "When running install, update, sync-cursor, or clean, use Make target or equivalent Python command from this codex."
    _foundation/tooling/lexis/lex-mcp:
      alwaysApply: false
      description: "When an MCP server is active for the current operation, use MCP tool over CLI. All credentials via env vars only. No servers outside mcp.servers in .directives."
    _foundation/tooling/codex/codex-mcp-github:
      alwaysApply: false
      description: "When using GitHub MCP server, use tools (create_issue, create_pull_request, push_files, etc.) and auth from this codex."
    _foundation/tooling/codex/codex-mcp-notion:
      alwaysApply: false
      description: "When using Notion MCP server, use tools (create_page, search, update_page, append_block_children, etc.) and auth from this codex."
    _foundation/tooling/codex/codex-mcp-figma:
      alwaysApply: false
      description: "When using Figma MCP server, use tools (get_file, get_component, get_local_variables, export_node, etc.) and auth from this codex."
    _foundation/tooling/codex/codex-mcp-slack:
      alwaysApply: false
      description: "When using the Slack MCP server (HTTP at mcp.slack.com/mcp, OAuth 2.0), use tools (slack_send_message, slack_read_channel, etc.) and channel resolution from this codex. Primary consumer: codex-notifications."
    _foundation/tooling/codex/codex-notifications:
      alwaysApply: false
      description: "When firing a framework notification (Athena PR timeout, Janus release, Eunomia plans digest), read notifications.provider and notifications.channels.* from .ahrena/.directives and invoke the corresponding MCP tool per this codex. Provider-agnostic; do not name the concrete provider in Lexis/Warriors/Katas."
    _foundation/process/codex/codex-session-tracking:
      alwaysApply: false
      description: "When operating on a plan as a Claude Code session, update the heartbeat file at .ahrena/workflow/sessions/<session-id>.json per this codex; kata-pr-prepare aggregates these into the Session Trace block of the PR body."
    _foundation/tooling/codex/codex-ahrena-mcp:
      alwaysApply: false
      description: "When querying the Ahrena framework via MCP (ahrena_query_lex, ahrena_get_codex, ahrena_search, ahrena_resolve_ref, etc.), consult this codex for tools, parameters, install path, and when to use vs read files directly."
    _foundation/tooling/codex/codex-git-spice:
      alwaysApply: false
      description: "When operating Stacked PRs and stacked_prs.tool=gs, consult this codex for git-spice install, setup, command catalog, vanilla→gs mapping, and force-push semantics."
    _foundation/tooling/codex/codex-pr-cost-tracking:
      alwaysApply: false
      description: "When pr_cost_tracking.enabled is true and a PR is created or updated, consult this codex for data source (Claude Code JSONL logs), ccusage invocation, fallback path, output format, idempotency markers, privacy notes, and known limitations."
    documentation/i18n/lexis/lex-language:
      alwaysApply: false
      description: "When translating technical docs, preserve structure and semantics; apply cross-cutting translation rules."
    documentation/i18n/lexis/lex-language-ptbr:
      alwaysApply: false
      description: "When translating to pt-BR, apply form of address, grammar, and term choices from this lex."
    documentation/i18n/lexis/lex-language-es:
      alwaysApply: false
      description: "When translating to Spanish, apply neutral variant and false-cognate rules from this lex."
    documentation/i18n/lexis/lex-language-en:
      alwaysApply: false
      description: "When translating to English, apply American English and active voice from this lex."
    documentation/i18n/codex/codex-language:
      alwaysApply: false
      description: "When translating docs, use cross-language guide and equivalence rules from this codex."
    documentation/i18n/codex/codex-language-ptbr:
      alwaysApply: false
      description: "When translating to pt-BR, use conventions and term table from this codex."
    documentation/i18n/codex/codex-language-es:
      alwaysApply: false
      description: "When translating to Spanish, use conventions and false-cognate table from this codex."
    documentation/i18n/codex/codex-language-en:
      alwaysApply: false
      description: "When translating to English, use conventions and pitfalls table from this codex."
    engineering/platform/lexis/lex-auth:
      alwaysApply: false
      globs: ["**/openapi/**", "**/oas/**", "**/api/**"]
      description: "When designing or implementing API access, apply OAuth 2.0/JWT/RBAC per Guardia auth spec."
    engineering/platform/lexis/lex-entities:
      alwaysApply: false
      description: "When designing persistent resources, include entity_id, entity_type, version, created_at, updated_at per spec."
    engineering/platform/lexis/lex-entity-naming:
      alwaysApply: false
      description: "When naming domain entities, follow the Guardia naming conventions: singular PascalCase for types, snake_case for fields, and event.guardia.{module}.{entity_type}.{event_name} for CloudEvents types."
    engineering/platform/lexis/lex-idempotency:
      alwaysApply: false
      description: "When designing state-changing APIs or events, require Idempotency-Key and deduplicate by key/hash."
    engineering/platform/lexis/lex-restful-apis:
      alwaysApply: false
      description: "When designing HTTP endpoints, follow RESTful spec: status codes, payload, headers, pagination."
    engineering/platform/lexis/lex-error-handling:
      alwaysApply: false
      description: "When returning errors, use errors array with code, reason, message; never reveal user existence in auth errors."
    engineering/platform/lexis/lex-cloudevents:
      alwaysApply: false
      description: "When publishing or consuming events, use CloudEvents format with idempotencykey and type catalog."
    engineering/platform/lexis/lex-feature-design-docs:
      alwaysApply: false
      description: "When persisting feature design artifacts (entities, OpenAPI, events, features, metrics), use docs/{context}/{category}/ structure plus feature-agent-map.md at the capability root. Agent design (agents/, dooc/) is governed by the parallel lex-agent-design-docs."
    engineering/platform/codex/codex-auth:
      alwaysApply: false
      description: "When implementing API authentication, use OAuth 2.0, FAPI 2.0, JWT, RBAC from this codex."
    engineering/platform/codex/codex-entities:
      alwaysApply: false
      description: "When modeling persistent entities, use base structure (entity_id, version, timestamps) from this codex."
    engineering/platform/codex/codex-idempotency:
      alwaysApply: false
      description: "When implementing mutations or event handlers, apply idempotency key and dedup rules from this codex."
    engineering/platform/codex/codex-error-handling:
      alwaysApply: false
      description: "When implementing error responses, use standardized structure and Known Errors from this codex."
    engineering/platform/codex/codex-known-errors:
      alwaysApply: false
      description: "When emitting or handling errors, look up the canonical code/reason pair and suggested handling from this catalog."
    engineering/platform/codex/codex-cloudevents:
      alwaysApply: false
      description: "When implementing event publishers/consumers, use CloudEvents structure and type naming from this codex."
    engineering/platform/codex/codex-restful-apis:
      alwaysApply: false
      description: "When designing or integrating REST APIs, apply endpoints and conventions from this codex."
    engineering/platform/codex/codex-restful-headers:
      alwaysApply: false
      description: "When defining or validating HTTP headers (e.g. Idempotency-Key, X-Grd-Trace-Id), use this codex."
    engineering/platform/codex/codex-restful-pagination:
      alwaysApply: false
      description: "When designing list endpoints, use page_size, page_token, order_by per pagination codex."
    engineering/platform/codex/codex-restful-payload:
      alwaysApply: false
      description: "When formatting API responses, use data/errors/pagination structure from this codex."
    engineering/platform/codex/codex-restful-sorting:
      alwaysApply: false
      description: "When adding sort to list endpoints, use order_by and sort params from this codex."
    engineering/platform/codex/codex-restful-status-codes:
      alwaysApply: false
      description: "When choosing HTTP status for a response, use allowed codes and meaning from this codex."
    engineering/platform/codex/codex-oas-structure:
      alwaysApply: false
      description: "When writing or ordering OpenAPI paths, follow operation order and structure from this codex."
    engineering/platform/codex/codex-feature-design-docs:
      alwaysApply: false
      description: "When producing feature design documents (entities, oas, events) under docs/{context}/, follow templates and conventions from this codex."
    engineering/platform/codex/codex-component-architecture:
      alwaysApply: false
      description: "When starting or auditing a Guardia bounded context, consult this parent codex for the canonical physical layout (components/api, agents, jobs, ui, deployment/, docs/), inter-component boundaries, and pointers to the 5 child codices."
    engineering/platform/codex/codex-component-api:
      alwaysApply: false
      globs: ["**/components/api/**"]
      description: "When working inside components/api/, follow hexagonal layout (adapters/inbound, adapters/outbound, application/ports, application/use_cases, domain), FastAPI/Powertools stack, idempotency middleware, and Result type."
    engineering/platform/codex/codex-component-agents:
      alwaysApply: false
      globs: ["**/components/agents/**"]
      description: "When working inside components/agents/, follow Orchestrator + Specialists pattern, tool registry, memory port abstraction; system prompt lives in docs/{context}/agents/ (documental axis)."
    engineering/platform/codex/codex-component-jobs:
      alwaysApply: false
      globs: ["**/components/jobs/**"]
      description: "When working inside components/jobs/, follow Lambda + Powertools stack, Step Functions I/O schemas, idempotency store, BatchProcessor for SQS/Kinesis."
    engineering/platform/codex/codex-component-ui:
      alwaysApply: false
      globs: ["**/components/ui/**"]
      description: "When working inside components/ui/, follow Next.js App Router + tsup widgets, mandatory @guardia/design-system, typed API client from openapi.yaml."
    engineering/platform/codex/codex-component-deployment:
      alwaysApply: false
      globs: ["**/deployment/**", "**/infra/**"]
      description: "When working inside deployment/, follow IaC per lex-aws-iac (one tool per bounded context), tagging per lex-aws-cost, security per lex-aws-security, runbooks linked to alarms."
    engineering/backend/lexis/lex-python-typing:
      alwaysApply: false
      globs: ["**/*.py"]
      description: "When writing Python code, require strict type annotations (mypy strict) for all functions and variables."
    engineering/backend/lexis/lex-python-testing:
      alwaysApply: false
      globs: ["**/*.py", "**/test_*.py", "**/*_test.py"]
      description: "When writing Python tests, use pytest with coverage; no untested public functions."
    engineering/backend/lexis/lex-python-security:
      alwaysApply: false
      globs: ["**/*.py"]
      description: "When writing Python code, follow security rules: no secrets in code, validate inputs, use parameterized queries."
    engineering/backend/lexis/lex-python-immutability:
      alwaysApply: false
      globs: ["**/*.py"]
      description: "When writing Python code, prefer immutable data structures; use frozen dataclasses and tuples."
    engineering/backend/lexis/lex-python-error-handling:
      alwaysApply: false
      globs: ["**/*.py"]
      description: "When writing Python code, no bare except; specific exceptions only; top-level boundary handlers must log original and translate into an Error."
    engineering/backend/lexis/lex-python-result-type:
      alwaysApply: false
      globs: ["**/*.py"]
      description: "When writing Python code, expected fallible operations must return Result[T, Error] from the returns package instead of raising exceptions."
    engineering/backend/lexis/lex-python-error-object:
      alwaysApply: false
      globs: ["**/*.py"]
      description: "When producing Python error values, use a frozen dataclass Error with exactly code, reason, message; subclasses pin code and reason."
    engineering/backend/codex/codex-python-architecture:
      alwaysApply: false
      globs: ["**/*.py"]
      description: "When structuring Python projects, use Clean Architecture layers (domain, application, infrastructure)."
    engineering/backend/codex/codex-python-fastapi:
      alwaysApply: false
      globs: ["**/*.py", "**/routers/**", "**/api/**"]
      description: "When building FastAPI endpoints, follow route structure, dependency injection, and response models from this codex."
    engineering/backend/codex/codex-python-sqlalchemy:
      alwaysApply: false
      globs: ["**/*.py", "**/models/**", "**/repositories/**"]
      description: "When using SQLAlchemy, use async sessions, mapped columns, and Alembic migrations per this codex."
    engineering/backend/codex/codex-python-testing:
      alwaysApply: false
      globs: ["**/*.py", "**/test_*.py"]
      description: "When writing Python tests, use pytest fixtures, factories, and coverage thresholds from this codex."
    engineering/backend/codex/codex-python-observability:
      alwaysApply: false
      globs: ["**/*.py"]
      description: "When adding observability, use OpenTelemetry traces, metrics, and structured logging from this codex."
    engineering/backend/codex/codex-python-tooling:
      alwaysApply: false
      description: "When setting up Python project tooling, use ruff, mypy, pytest, and uv per this codex."
    engineering/workflow/lexis/lex-issue-driven:
      alwaysApply: false
      description: "When using /cry-implement-issue or warrior-athena, enforce Gates 1/2, AC↔test traceability, ADR generation, and docs/ structure."
    engineering/workflow/codex/codex-issue-workflow:
      alwaysApply: false
      description: "When orchestrating Issue-Driven flow, follow 7 phases, 2 gates, MADR format, and delegation to Apollo/Daedalus/Kronos/Hephaestus/Atlas from this codex."
    engineering/frontend/lexis/lex-frontend-typing:
      alwaysApply: false
      globs: ["**/*.ts", "**/*.tsx", "**/*.vue", "**/*.svelte"]
      description: "When writing frontend code, enforce TypeScript strict mode; no implicit or unjustified any; contracts typed via OAS or Zod."
    engineering/frontend/lexis/lex-frontend-testing:
      alwaysApply: false
      globs: ["**/*.test.ts", "**/*.test.tsx", "**/*.spec.ts", "**/*.spec.tsx"]
      description: "When writing frontend tests, test user behavior with accessible queries; mock only at external boundaries."
    engineering/frontend/lexis/lex-frontend-accessibility:
      alwaysApply: false
      globs: ["**/*.tsx", "**/*.jsx", "**/*.vue", "**/*.svelte", "**/*.html"]
      description: "When building UI, meet WCAG 2.1 AA as minimum; semantic HTML, keyboard navigation, labels, contrast, dynamic content announcements."
    engineering/frontend/lexis/lex-frontend-security:
      alwaysApply: false
      globs: ["**/*.ts", "**/*.tsx", "**/*.vue"]
      description: "When writing frontend code, prevent XSS, never bundle secrets, validate inputs in two tiers, configure CSP, rel=noopener on external links."
    engineering/frontend/codex/codex-frontend-architecture:
      alwaysApply: false
      description: "When designing frontend structure, follow layer separation, server/client state split, component composition, routing, performance, and i18n from this codex."
    engineering/devops/lexis/lex-aws-security:
      alwaysApply: false
