      description: "Every persistent data class MUST declare retention + legal basis; LGPD/GDPR deletion SLA enforced; logs with PII are time-limited."
    engineering/quality/lexis/lex-test-isolation:
      paths: ["**/tests/**", "**/test_*.py", "**/*_test.py", "**/*.test.ts", "**/*.test.tsx", "**/*.spec.ts", "**/__tests__/**"]
      description: "Tests must be deterministic, order-independent, parallelizable; flaky is a P1 bug — no retries as cure."
    engineering/sre/lexis/lex-runbook-for-every-alert:
      paths: ["docs/runbooks/**", "**/runbooks/**", "**/alerts/**", "**/*.alerts.yaml"]
      description: "Every human-paging alert MUST link to a versioned runbook with symptoms, diagnosis, mitigation, escalation."
    engineering/frontend/lexis/lex-frontend-security:
      paths: ["**/*.ts", "**/*.tsx", "**/*.js", "**/*.jsx", "**/*.vue", "**/*.svelte"]
      description: "When writing frontend code, prevent XSS, never bundle secrets, validate inputs in two tiers, configure CSP, rel=noopener on external links."
    engineering/frontend/lexis/lex-frontend-testing:
      paths: ["**/*.test.ts", "**/*.test.tsx", "**/*.spec.ts", "**/*.spec.tsx", "**/__tests__/**"]
      description: "When writing frontend tests, test user behavior with accessible queries; mock only at external boundaries."
    engineering/backend/lexis/lex-python-typing:
      paths: ["**/*.py"]
      description: "When writing Python code, require strict type annotations (mypy strict) for all functions and variables."
    engineering/backend/lexis/lex-python-security:
      paths: ["**/*.py"]
      description: "When writing Python code, follow security rules: no secrets in code, validate inputs, use parameterized queries."
    engineering/backend/lexis/lex-python-immutability:
      paths: ["**/*.py"]
      description: "When writing Python code, prefer immutable data structures; use frozen dataclasses and tuples."
    engineering/backend/lexis/lex-python-testing:
      paths: ["**/*.py", "**/test_*.py", "**/*_test.py"]
      description: "When writing Python tests, use pytest with coverage; no untested public functions."
    engineering/backend/lexis/lex-python-error-handling:
      paths: ["**/*.py"]
      description: "When writing Python code, no bare except; specific exceptions only; top-level boundary handlers must log original and translate into an Error."
    engineering/backend/lexis/lex-python-error-object:
      paths: ["**/*.py"]
      description: "When producing Python error values, use a frozen dataclass Error with exactly code, reason, message; subclasses pin code and reason."
    engineering/backend/lexis/lex-python-result-type:
      paths: ["**/*.py"]
      description: "When writing Python code, expected fallible operations must return Result[T, Error] from the returns package instead of raising exceptions."
    engineering/platform/lexis/lex-auth:
      paths: ["**/auth/**", "**/*auth*.py", "**/*auth*.ts", "**/openapi/**", "**/oas/**", "**/api/**"]
      description: "When designing or implementing API access, apply OAuth 2.0/JWT/RBAC per Guardia auth spec."
    engineering/platform/lexis/lex-cloudevents:
      paths: ["**/events/**", "**/*event*.py", "**/*event*.ts"]
      description: "When publishing or consuming events, use CloudEvents format with idempotencykey and type catalog."
    engineering/platform/lexis/lex-entities:
      paths: ["**/entities/**", "**/*entity*.py", "docs/**/entities/**"]
      description: "When designing persistent resources, include entity_id, entity_type, version, created_at, updated_at per spec."
    engineering/platform/lexis/lex-entity-naming:
      paths: ["**/entities/**", "**/*entity*", "docs/**/entities/**"]
      description: "When naming domain entities, follow Guardia conventions: singular PascalCase for types, snake_case for fields, event.guardia.{module}.{entity_type}.{event_name} for CloudEvents types."
    engineering/platform/lexis/lex-error-handling:
      paths: ["**/*.py", "**/*.ts", "**/api/**", "**/handlers/**"]
      description: "When returning errors, use errors array with code, reason, message; never reveal user existence in auth errors."
    engineering/platform/lexis/lex-idempotency:
      paths: ["**/api/**", "**/*api*.py", "**/*router*.py", "**/events/**"]
      description: "When designing state-changing APIs or events, require Idempotency-Key and deduplicate by key/hash."
    engineering/platform/lexis/lex-restful-apis:
      paths: ["**/api/**", "**/*api*.py", "**/*router*.py", "**/openapi*.yaml", "docs/**/oas/**"]
      description: "When designing HTTP endpoints, follow RESTful spec: status codes, payload, headers, pagination."
    engineering/platform/lexis/lex-feature-design-docs:
      paths: ["docs/**"]
      description: "When persisting feature design artifacts (entities, OpenAPI, events, features, metrics), use docs/{context}/{category}/ structure plus feature-agent-map.md at the capability root. Agent design (agents/, dooc/) is governed by the parallel lex-agent-design-docs."
    engineering/agents/lexis/lex-agent-design-docs:
      paths: ["docs/**/agents/**", "docs/**/dooc/**", "docs/**/feature-agent-map.md"]
      description: "When promoting an agent to operational-concrete, enforce the 5-precondition HARD-GATE: 13 files in docs/{context}/agents/{agent}/, dooc/{agent}.md, serves_features populated, reciprocity in feature-agent-map.md, and warrior-metis declared as author."
    _foundation/process/lexis/lex-agent-planning:
      paths: [".claude/plans/**", ".cursor/plans/**", "**/plan-*.md"]
      description: "Before any multi-step task, create a Plan sub-issue on GitHub linked to its parent Issue and materialize the provider cache at ./{agent}/plans/plan-{M}-{slug}.md (where {M} is the sub-issue number and {slug} matches the branch). Present to the user and wait for confirmation before executing."
    _foundation/contributing/lexis/lex-issue-quality:
      paths: [".github/ISSUE_TEMPLATE/**"]
      description: "When creating or reviewing an issue, ensure it uses an approved template (feature-request, epic, user-story-for-api/frontend, bug, tech-task, plan), has required labels, has a defined Issue Type, answers Why/What/How, and (for non-Epic) carries status: todo at creation. Assignee is NOT a creation requirement — it is captured at todo → development by warrior-athena (second HARD-GATE in this Lex)."
    _foundation/contributing/lexis/lex-issue-status:
      paths: [".github/ISSUE_TEMPLATE/**", ".github/PULL_REQUEST_TEMPLATE.md", ".github/PULL_REQUEST_TEMPLATE/**", "scripts/bootstrap_labels.sh"]
      description: "When applying or transitioning a status:* label, choose the axis based on artifact type: Axis A (dev cycle: todo→development→to review→review→done) for feature/fix Issues/PRs; Axis B (release cycle: to release→release→done) exclusively for the release Issue. Mutex is intra-artifact; cross-axis labeling is a HARD-GATE violation."
    _foundation/contributing/lexis/lex-issue-type-verified:
      paths: [".github/ISSUE_TEMPLATE/**"]
      description: "When creating an Issue via CLI/MCP (not via UI template), verify the native type field is populated post-creation and apply manually via gh api -X PATCH when empty. status: todo cannot be applied to a typeless Issue."
    _foundation/contributing/lexis/lex-issue-first:
      paths: [".github/ISSUE_TEMPLATE/**", ".github/PULL_REQUEST_TEMPLATE.md", ".github/PULL_REQUEST_TEMPLATE/**"]
      description: "When starting any code change, ensure a GitHub Issue exists first; PR body must include Closes #N or Refs #N."
    _foundation/contributing/lexis/lex-pr-quality:
      paths: [".github/PULL_REQUEST_TEMPLATE.md", ".github/PULL_REQUEST_TEMPLATE/**", ".github/CODEOWNERS"]
      description: "When creating a PR, mirror issue labels, apply size label, set assignee to author, request reviewers per CODEOWNERS, apply status:* label, and include Session Trace section when heartbeat files exist for the branch."
    _foundation/contributing/lexis/lex-git-branches:
      paths: [".github/CODEOWNERS", ".github/workflows/**.yml", ".github/workflows/**.yaml"]
      description: "When creating a branch, use format {type}/{issue-number}-{kebab-slug}; type must be a Conventional Commits type; issue number is mandatory."
    _foundation/contributing/lexis/lex-git-worktrees:
      paths: [".github/CODEOWNERS", ".gitignore", ".github/workflows/**.yml"]
      description: "Every branch-based task by an AI agent must run inside a dedicated git worktree under paths.worktrees; main checkout stays clean."
    _foundation/contributing/lexis/lex-conventional-commits:
      paths: ["**/COMMIT_EDITMSG", ".commitlintrc*", ".github/workflows/**commit**.yml", ".github/workflows/**commit**.yaml"]
      description: "When writing a commit message, use format type(scope): description (feat, fix, docs, etc.)."
    _foundation/contributing/lexis/lex-commit-language:
      paths: ["**/COMMIT_EDITMSG", ".commitlintrc*", ".github/workflows/**commit**.yml", ".github/workflows/**commit**.yaml"]
      description: "When writing commit message: subject in English; use [lang] tag in body for local language."
    _foundation/contributing/lexis/lex-small-commits:
      paths: ["**/COMMIT_EDITMSG", ".commitlintrc*"]
      description: "When committing, ensure one logical change per commit; split if multiple purposes."
    _foundation/contributing/lexis/lex-signed-commits:
      paths: ["**/COMMIT_EDITMSG", ".gitconfig", "**/.gitsigners"]
      description: "When pushing commits or configuring Git, ensure commits are GPG-signed and show Verified."
    _foundation/contributing/lexis/lex-semantic-version:
      paths: ["package.json", "**/__version__.py", "**/version.txt", "CHANGELOG*", ".bumpversion*", "pyproject.toml"]
      description: "When creating a release or tag, use MAJOR.MINOR.PATCH (SemVer); no other format allowed."
    _foundation/contributing/lexis/lex-annotated-tags:
      paths: [".github/workflows/validate-tag.yml", ".github/workflows/release.yml", "CHANGELOG*"]
      description: "When pushing a tag to a Guardia remote, ensure it is annotated (git tag -a) and GPG-signed (git tag -s); lightweight tags are forbidden."
    product/discovery/lexis/lex-discovery-flow:
      paths: ["docs/discovery/**"]
      description: "When producing or modifying insights/ideas, enforce: warrior-phanes promotes only from approved insights with all 5 mandatory Idea fields; warrior-pitia never changes status without explicit human direction."

